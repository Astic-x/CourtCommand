<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Spring Cup</title>
  <link rel="stylesheet" href="/css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
  <style>
/* =========================
   GLOBAL
========================= */
body { 
  background: #0b0d17; 
  color: #e8eaf0; 
  font-family: 'Barlow', sans-serif; 
  line-height: 1.6;
}

/* =========================
   HERO SECTION
========================= */
.t-hero {
  padding: 80px 60px;
  background: radial-gradient(circle at top left, #1a1c2c, #0b0d17);
  border-bottom: 1px solid rgba(255,122,24,0.1);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.t-hero h1 {
  font-family: 'Anton', sans-serif;
  font-size: 48px;
  letter-spacing: 2px;
  color: white;
}

.t-hero-meta {
  margin-top: 10px;
  display: flex;
  gap: 24px;
}

.t-hero-meta span {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #4a5068;
}

.t-hero-meta span strong { color: #ff7a18; }

/* =========================
   BUTTONS
========================= */
.register-btn {
  background: #ff7a18;
  color: white;
  border: none;
  padding: 14px 30px;
  border-radius: 10px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  transition: 0.25s;
  text-decoration: none;
}

.register-btn:hover {
  background: #ff8f32;
  transform: translateY(-2px);
  box-shadow: 0 10px 25px rgba(255,122,24,0.4);
}

.register-btn.disabled {
  background: #1e2030;
  color: #4a5068;
  cursor: not-allowed;
  border: 1px solid #2a2d3e;
}

.action-btn {
  background: linear-gradient(90deg, #ff7a18, #ff8f32);
  border: none;
  padding: 10px 18px;
  border-radius: 8px;
  color: white;
  cursor: pointer;
  font-weight: 600;
  transition: 0.2s;
  text-decoration: none;
  display: inline-block;
  font-size: 14px;
}

.action-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(255,122,24,0.4);
}

.danger-btn {
  background: linear-gradient(90deg, #ff3b3b, #ff5c5c);
  border: none;
  padding: 12px 15px;
  border-radius: 8px;
  color: white;
  cursor: pointer;
}

/* =========================
   ADMIN PANEL REWORK
========================= */
.admin-panel-card {
  max-width: 1300px;
  margin: 0 auto 40px auto;
  padding: 0 20px;
}
.admin-actions-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 20px;
}
.admin-action-box {
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid rgba(255, 122, 24, 0.15);
  border-radius: 12px;
  padding: 24px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}
.admin-action-box h4 {
  margin: 0 0 8px 0;
  font-family: 'Barlow Condensed', sans-serif;
  letter-spacing: 1.5px;
  font-size: 20px;
  color: #ff7a18;
  text-transform: uppercase;
}
.admin-action-box p {
  font-size: 14px;
  color: #a0a4b8;
  margin-bottom: 20px;
}
.flex-form {
  display: flex;
  gap: 10px;
  width: 100%;
}
.flex-form input {
  flex: 1;
  padding: 10px 12px;
  border-radius: 6px;
  border: 1px solid rgba(255,255,255,0.1);
  background: #0f1324;
  color: white;
  width: 100%;
}
.position-relative {
  position: relative;
  flex: 1;
  display: flex;
  flex-direction: column;
}
.suggestions-box {
  position: absolute;
  top: 100%;
  left: 0;
  width: 100%;
  background: #111424;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 6px;
  z-index: 100;
  max-height: 150px;
  overflow-y: auto;
}
.suggestions-box div {
  padding: 10px;
  cursor: pointer;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.suggestions-box div:hover {
  background: rgba(255,122,24,0.2);
}

/* =========================
   BODY LAYOUT
========================= */
.t-body {
  max-width: 1300px;
  margin: 0 auto;
  padding: 40px 20px;
}

.fixtures-full {
  margin-bottom: 50px;
}

.top-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 30px;
  align-items: start;
}

/* =========================
   SECTION TITLE
========================= */
.section-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: #ff7a18;
  margin-bottom: 25px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.section-title::after {
  content: "";
  flex: 1;
  height: 1px;
  background: rgba(255, 122, 24, 0.2);
}

/* =========================
   FIXTURES
========================= */
.round-block {
  margin-bottom: 30px;
}

.round-title {
  font-size: 12px;
  letter-spacing: 2px;
  color: #ff7a18;
  margin-bottom: 10px;
  font-weight: 700;
}
.fixture-select {
  padding: 10px;
  border-radius: 6px;
  background: #0f1324;
  color: white;
  border: 1px solid rgba(255,255,255,0.1);
  flex: 1;
}

/* =========================
   FIXTURES DELUXE
========================= */
.fixture-card {
  background: linear-gradient(145deg, rgba(20, 24, 40, 0.8), rgba(15, 18, 30, 0.9));
  border: 1px solid rgba(255, 255, 255, 0.05);
  border-radius: 12px;
  padding: 0;
  margin-bottom: 15px;
  display: flex;
  align-items: stretch;
  transition: transform 0.2s, box-shadow 0.2s;
  position: relative;
  overflow: hidden;
}

.fixture-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 25px rgba(0,0,0,0.5);
  border-color: rgba(255, 122, 24, 0.3);
}

.fixture-status-bar {
  width: 5px;
  background: #4a5068;
}
.fixture-card.is-live .fixture-status-bar { background: #ff4545; }
.fixture-card.is-final .fixture-status-bar { background: #22c55e; }
.fixture-card.is-upcoming .fixture-status-bar { background: #ff7a18; }

.fixture-content {
  flex: 1;
  padding: 24px;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 20px;
}

.fixture-team {
  font-family: 'Anton', sans-serif;
  font-size: 26px;
  letter-spacing: 1px;
}

.fixture-team.away { text-align: right; }

.fixture-center {
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  min-width: 140px;
}

.fixture-score {
  font-size: 32px;
  font-weight: 800;
  font-family: 'Barlow Condensed', sans-serif;
  background: rgba(0,0,0,0.4);
  padding: 5px 25px;
  border-radius: 8px;
  letter-spacing: 2px;
  border: 1px solid rgba(255,255,255,0.05);
}

.fixture-score.tbd {
  color: #666;
  font-size: 20px;
  padding: 5px 20px;
}

.fixture-meta {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}

.status-badge {
  padding: 5px 12px;
  border-radius: 4px;
  font-weight: 700;
  font-size: 11px;
}

.status-badge.live { background: rgba(255, 69, 69, 0.2); color: #ff4545; animation: pulseLive 2s infinite; }
.status-badge.final { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
.status-badge.upcoming { background: rgba(255, 255, 255, 0.1); color: #aaa; }

@keyframes pulseLive {
  0% { box-shadow: 0 0 0 0 rgba(255, 69, 69, 0.4); }
  70% { box-shadow: 0 0 0 6px rgba(255, 69, 69, 0); }
  100% { box-shadow: 0 0 0 0 rgba(255, 69, 69, 0); }
}

.fixture-admin-actions {
  background: rgba(0,0,0,0.2);
  padding: 15px 20px;
  display: flex;
  align-items: center;
  gap: 15px;
  border-left: 1px solid rgba(255,255,255,0.05);
}

/* =========================
   CARD PANEL
========================= */
.card-panel {
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid rgba(255, 255, 255, 0.06);
  border-radius: 16px;
  padding: 24px;
}

/* =========================
   TABLE
========================= */
.leaderboard-table {
  width: 100%;
  border-collapse: collapse;
}
.leaderboard-table th {
  font-size: 11px;
  color: #4a5068;
  padding: 10px;
}
.leaderboard-table td {
  padding: 12px 10px;
  border-bottom: 1px solid rgba(255,255,255,0.03);
}

/* =========================
   TEAMS
========================= */
.team-row {
  display: flex;
  align-items: center;
  padding: 10px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.team-rank {
  width: 30px;
  color: #666;
}
.team-name {
  flex: 1;
  font-weight: 600;
}

.danger-btn-mini {
  background: rgba(255, 69, 69, 0.1);
  color: #ff4545;
  border: 1px solid rgba(255, 69, 69, 0.2);
  width: 24px;
  height: 24px;
  border-radius: 50%;
  cursor: pointer;
}

.slots-left {
  text-align: center;
  margin-top: 16px;
  font-size: 12px;
  letter-spacing: 2px;
  color: #4a5068;
}
.slots-left strong { color: #ff7a18; }

.no-fixtures {
  text-align: center;
  padding: 40px;
  color: #2a2d3e;
  font-size: 14px;
  letter-spacing: 2px;
  background: rgba(255,255,255,0.02);
  border-radius: 12px;
}

/* =========================
   FORM INPUT
========================= */
.quick-update-form {
  display: flex;
  gap: 8px;
}
.quick-update-form input {
  width: 40px;
  height: 30px;
  background: #161821;
  border: 1px solid rgba(255, 122, 24, 0.3);
  color: white;
  text-align: center;
}
  </style>
</head>
<body>

<header class="main-navbar">

  <nav class="nav-left">
    <a href="/">Home</a>
    <a href="/tournaments">Tournaments</a>

    
  </nav>

  <div class="logo">Court<span>Command</span></div>

 <nav class="nav-right">

  <a href="/standings">Standings</a>
  <a href="/news">News</a>

  
    <a href="/login" class="signin">Sign In</a>
  

</nav>

</header>

<div class="t-hero">
  <div>
    <h1>SPRING CUP</h1>
    <div class="t-hero-meta">
      <span>📍 <strong>Graphic Era Hill, Bheem Tal</strong></span>
      <span>📅 <strong>
        1 Mar 2026
        —
        31 Mar 2026
      </strong></span>
      <span>👥 <strong>2 / 8</strong> teams</span>
    </div>
  </div>

  
    <a href="/login" class="register-btn">Sign In to Register</a>
  
</div>



<div class="t-body">

  <div class="top-grid">

    <div>
      <div class="section-title">Standings</div>
      <div class="card-panel">
        
          <table class="leaderboard-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Team</th>
                <th>MP</th>
                <th>W</th>
                <th>L</th>
                <th style="color:#ff7a18">Pts</th>
              </tr>
            </thead>
            <tbody>
              
                <tr>
                  <td><span class="rank-pill">1</span></td>
                  <td>SEC</td>
                  <td>0</td>
                  <td>0</td>
                  <td>0</td>
                  <td style="color:#ff7a18">0</td>
                </tr>
              
                <tr>
                  <td><span class="rank-pill">2</span></td>
                  <td>sasd</td>
                  <td>0</td>
                  <td>0</td>
                  <td>0</td>
                  <td style="color:#ff7a18">0</td>
                </tr>
              
            </tbody>
          </table>
        
      </div>
    </div>

    <div>
      <div class="section-title">Teams</div>
      <div class="card-panel">
        
          <div class="team-row">
            <span class="team-rank">#1</span>
            <span class="team-name">SEC</span>
            
          </div>
        
          <div class="team-row">
            <span class="team-rank">#2</span>
            <span class="team-name">sasd</span>
            
          </div>
        
        <div class="slots-left">
          <strong>6</strong> slots remaining
        </div>
      </div>
    </div>

  </div>

  <div class="fixtures-full">
    <div class="section-title">Match Fixtures</div>

    
      <div class="no-fixtures">FIXTURES WILL BE ANNOUNCED SOON</div>
    
  </div>
</div>

<script>
const allTeams = [{"id":4,"team":"ADMIN"},{"id":7,"team":"ank"},{"id":6,"team":"sasd"},{"id":5,"team":"SEC"},{"id":9,"team":"Test Squad"},{"id":10,"team":"Test squad 1"},{"id":8,"team":"vis"}];
const input = document.getElementById("teamSearch");
const suggestions = document.getElementById("suggestions");
const hiddenInput = document.getElementById("teamId");

input.addEventListener("input", () => {
  hiddenInput.value = ""; 
  const value = input.value.toLowerCase().trim();
  suggestions.innerHTML = "";
  if (!value) return;

  const filtered = allTeams.filter(t => t.team && t.team.toLowerCase().includes(value));
  filtered.forEach(t => {
    const div = document.createElement("div");
    div.innerText = t.team;
    div.onclick = () => {
      input.value = t.team;
      hiddenInput.value = t.id;
      suggestions.innerHTML = "";
    };
    suggestions.appendChild(div);
  });
});
</script>

</body>
</html>
